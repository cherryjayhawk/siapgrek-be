  ## Implementation Phases (OpenSpec Change Sets)

  When initiating the `/opsx-new` workflow, adhere to this hierarchical rollout sequence to ensure dependencies are naturally resolved before higher-level services are built:

  ### Phase 1: Foundation & Infrastructure
  * Define and spin up the Docker Compose network (`mosquitto`, `timescaledb`, `redis`).
  * Initialize the global monorepo structure and apply base `.env` configs.
  * Establish the core relational schema (Auth, Disease, Anomaly models) via migrations.

  ### Phase 2: Core Data Ingestion Pipeline
  * Build the `ingestion-service` (Bun/TypeScript).
  * Implement MQTT subscription, payload validation, and the 5-minute TimescaleDB batch insert engine.
  * Connect BullMQ to emit processing events after successful batch saves.

  ### Phase 3: Hardware Integration (Edge Layer)
  * Flash the ESP32 logic (`edge/`).
  * Establish Modbus sensor mapping and enforce the 10-second MQTT telemetry publish loop.

  ### Phase 4: Identity & Fast Query (Analytic & Auth)
  * Build the `auth-service` with Better Auth (JWTs, Session tracking).
  * Build the `analytic-service` (Go/Fiber) to safely expose blazing-fast sensor data read endpoints.

  ### Phase 5: Knowledge Context Base
  * Build the `knowledge-service` (Bun/Hono).
  * Setup markdown ingestion pipelines and expose raw data via MCP servers (Preference, Sensor History, Disease Log, Anomaly Record).

  ### Phase 6: Core AI Intelligence layer
  * Build the `intelligent-service` (Python/FastAPI).
  * Integrate TensorFlow Lite `.tflite` endpoints for disease/anomaly classification.
  * Hook up the background BullMQ Anomaly detection worker to consume `ingestion-service` batches asynchronously.
  * Construct the Service-level Fuzzy Logic unit to actively publish MQTT command overrides down to the Edge actuators.

  ### Phase 7: Natural Language Insights (RAG integration)
  * Finalize the `intelligent-service` Insight MCP Client.
  * Integrate the OpenAI API to consume the `knowledge-service` MCPs and generate comprehensive natural language agricultural intelligence for the end-user.

