# Per-artifact Rules
# ============================================================================
rules:
  proposal:
    - Keep proposals concise and focused on the core problem being solved
    - Always include a "Non-goals" section to define exact scope boundaries
    - Include an "Impact" section describing affected areas of the distributed architecture
    - Write proposals in English

  specs:
    - Delta specs must be highly specific: always define exact file paths for modifications
    - Explicitly include API contracts (request/response schemas) for any new endpoints
    - Detailed database schema changes must be provided if TimescaleDB/PostgreSQL is altered
    - Consider cross-service dependencies (MQTT, REST, BullMQ) in every spec
    
  design:
    - Include sequence flows for complex event-driven interactions
    - Clearly explain trade-offs of architectural decisions (e.g. batch logic vs latency)
    - Prioritize fault isolation, fallback logic, and edge-case handling in the design
    - Always include performance/latency considerations for heavy operations (LLM/MCP inferences, batch inserts)

  tasks:
    - Break tasks into highly actionable chunks of max 2 hours estimated work
    - Each task must be independently testable to ensure isolated service testing
    - Include crystal clear acceptance criteria for every single chunk
    - Order tasks strictly based on dependency resolution (e.g. database schema before API routes)
    - Explicitly list targeted file paths that need creation/modification per task
