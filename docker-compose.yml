# ===========================================
# Greenhouse Orchid IoT System
# Docker Compose - Infrastructure Services
# ===========================================

services:
  # -------------------------------------------
  # MQTT Broker - Eclipse Mosquitto
  # -------------------------------------------
  mosquitto:
    image: eclipse-mosquitto:latest
    container_name: orchid-mosquitto
    restart: unless-stopped
    ports:
      - "${MOSQUITTO_PORT:-1883}:1883"
    volumes:
      - ./mosquitto/config:/mosquitto/config:ro
      - mosquitto-data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log
    networks:
      - orchid-net
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_sub -t '$$SYS/broker/uptime' -C 1 -u ${MOSQUITTO_USERNAME} -P ${MOSQUITTO_PASSWORD} || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # -------------------------------------------
  # TimescaleDB (PostgreSQL + TimescaleDB ext.)
  # -------------------------------------------
  timescaledb:
    image: timescale/timescaledb:latest-pg17
    container_name: orchid-timescaledb
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - timescaledb-data:/var/lib/postgresql/data
    networks:
      - orchid-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # -------------------------------------------
  # Redis (BullMQ Backend)
  # -------------------------------------------
  redis:
    image: redis:alpine
    container_name: orchid-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    networks:
      - orchid-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  # -------------------------------------------
  # Data Ingestion Worker
  # -------------------------------------------
  ingestion-service:
    build:
      context: ./services/ingestion-service
      dockerfile: Dockerfile
    container_name: orchid-ingestion-service
    restart: unless-stopped
    depends_on:
      mosquitto:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ./services/ingestion-service/.env
    networks:
      - orchid-net

  # -------------------------------------------
  # Analytic Service (Go + Fiber) - Query Engine
  # -------------------------------------------
  analytic-service:
    build:
      context: ./services/analytic-service
      dockerfile: Dockerfile
    container_name: orchid-analytic-service
    restart: unless-stopped
    ports:
      - "${ANALYTIC_PORT:-3002}:3000"
    depends_on:
      timescaledb:
        condition: service_healthy
    environment:
      DB_HOST: timescaledb
      DB_PORT: "5432"
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB}
      DB_MAX_CONNS: "20"
      ANALYTIC_PORT: "3000"
    networks:
      - orchid-net
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  # -------------------------------------------
  # Auth Service (Bun + Better Auth)
  # -------------------------------------------
  auth-service:
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
    container_name: orchid-auth-service
    restart: unless-stopped
    ports:
      - "${AUTH_PORT:-3001}:3000"
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: http://localhost:3000
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@timescaledb:5432/${POSTGRES_DB}?schema=public
      REDIS_URL: redis://redis:6379
      AUTH_PORT: "3000"
    networks:
      - orchid-net
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  # -------------------------------------------
  # Knowledge Service (Bun + Hono) - MCP/RAG
  # -------------------------------------------
  knowledge-service:
    build:
      context: ./services/knowledge-service
      dockerfile: Dockerfile
    container_name: orchid-knowledge-service
    restart: unless-stopped
    ports:
      - "${KNOWLEDGE_PORT:-3004}:3000"
    depends_on:
      timescaledb:
        condition: service_healthy
    environment:
      # DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@timescaledb:5432/${POSTGRES_DB}?schema=public
      DATABASE_URL: postgresql://neondb_owner:npg_pcrse93vmkCY@ep-mute-wildflower-a1s7gj8h-pooler.ap-southeast-1.aws.neon.tech/neondb?sslmode=require&channel_binding=require
      KNOWLEDGE_PORT: "3000"
      OPENWEATHERMAP_API_KEY: ${OPENWEATHERMAP_API_KEY}
    volumes:
      - ./services/knowledge-service/docs:/app/docs
    networks:
      - orchid-net
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  # -------------------------------------------
  # Intelligent Service (Python + FastAPI) - AI/ML
  # -------------------------------------------
  intelligent-service:
    build:
      context: ./services/intelligent-service
      dockerfile: Dockerfile
    container_name: orchid-intelligent-service
    restart: unless-stopped
    ports:
      - "${INTELLIGENT_PORT:-3003}:3003"
    depends_on:
      mosquitto:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ./services/intelligent-service/.env
    # environment:
    #   REDIS_HOST: orchid-redis
    #   REDIS_PORT: "6379"
    #   MQTT_BROKER_HOST: orchid-mosquitto
    #   MQTT_BROKER_PORT: "1883"
    #   MQTT_USERNAME: ${MOSQUITTO_USERNAME}
    #   MQTT_PASSWORD: ${MOSQUITTO_PASSWORD}
    #   DISEASE_MODEL_PATH: models/model_cnn_finetuned_V3.tflite
    #   ANOMALY_MODEL_PATH: models/anomaly_detection.tflite
    #   SERVICE_PORT: "3003"
    networks:
      - orchid-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:3003/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

# -------------------------------------------
# Networks
# -------------------------------------------
networks:
  orchid-net:
    driver: bridge
    name: orchid-net

# -------------------------------------------
# Volumes (named, persistent)
# -------------------------------------------
volumes:
  mosquitto-data:
    name: orchid-mosquitto-data
  timescaledb-data:
    name: orchid-timescaledb-data
  redis-data:
    name: orchid-redis-data
